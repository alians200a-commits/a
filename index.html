<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الأسئلة الوزارية حول أسماء الاستفهام (المجموعة الثانية) — تطبيق مدرسي</title>
    <script>
      // Automatically append a trailing slash to the URL if it is missing, to ensure relative asset paths work correctly on GitHub Pages
      (function() {
        var path = window.location.pathname;
        if (path.length > 1 && !path.endsWith('/') && !path.split('/').pop().includes('.')) {
          window.location.replace(window.location.href + '/');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
